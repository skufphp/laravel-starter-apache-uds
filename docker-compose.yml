services:
  # Основной контейнер Laravel PHP-FPM
  laravel-php-apache-uds:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
      target: development
      args:
        INSTALL_XDEBUG: "true"
    image: laravel-php-apache-uds:dev
    pull_policy: never
    container_name: laravel-php-apache-uds
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
      - unix-socket:/var/run/php
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/var/www/laravel}
      XDEBUG_MODE: ${XDEBUG_MODE}
      XDEBUG_START: ${XDEBUG_START}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST}
    networks:
      - laravel-apache-uds-network
    healthcheck:
      # Проверка доступности FPM через сокет
      test:
        [
          "CMD-SHELL",
          "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect /var/run/php/php-fpm.sock | grep -q 'pong'"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Веб-сервер Httpd (Proxy)
  laravel-apache-uds:
    build:
      context: .
      dockerfile: docker/httpd.Dockerfile
      target: development
    image: laravel-apache-uds:dev
    pull_policy: never
    container_name: laravel-apache-uds
    restart: unless-stopped
    volumes:
      - .:/var/www/laravel
      - unix-socket:/var/run/php
    ports:
      - "${HTTPD_PORT}:80"
    networks:
      - laravel-apache-uds-network
    depends_on:
      laravel-php-apache-uds:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js для сборки фронтенда и Hot Module Replacement (HMR)
  laravel-node-apache-uds:
    image: node:24-alpine
    container_name: laravel-node-apache-uds
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
      - node_modules:/var/www/laravel/node_modules
    command: >
      sh -lc '
        # Установка зависимостей, если они отсутствуют
        if [ -f package-lock.json ]; then
          npm ci;
        else
          npm install;
        fi;

        # Запуск Vite в режиме разработки
        npm run dev -- --host 0.0.0.0 --port 5173
      '
    ports:
      - "5173:5173"
    networks:
      - laravel-apache-uds-network

  # База данных PostgreSQL
  laravel-postgres-apache-uds:
    image: postgres:18.2-alpine
    container_name: laravel-postgres-apache-uds
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "${DB_FORWARD_PORT}:5432"
    networks:
      - laravel-apache-uds-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    # Хранилище данных Redis
  laravel-redis-apache-uds:
    image: redis:8.6-alpine
    container_name: laravel-redis-apache-uds
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-}" ]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    networks:
      - laravel-apache-uds-network
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a \"${REDIS_PASSWORD:-}\" ping || redis-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Laravel Queue Worker — обработка фоновых задач
  laravel-queue-apache-uds:
    image: laravel-php-apache-uds:dev
    container_name: laravel-queue-apache-uds
    pull_policy: never
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
    command: [ "php", "artisan", "queue:work", "--sleep=1", "--tries=1" ]
    networks:
      - laravel-apache-uds-network
    depends_on:
      laravel-php-apache-uds:
        condition: service_healthy
      laravel-postgres-apache-uds:
        condition: service_healthy
      laravel-redis-apache-uds:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep -v grep | grep 'queue:work' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Laravel Scheduler — запуск периодических задач (cron)
  laravel-scheduler-apache-uds:
    image: laravel-php-apache-uds:dev
    container_name: laravel-scheduler-apache-uds
    pull_policy: never
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - .:/var/www/laravel
    command: [ "php", "artisan", "schedule:work" ]
    networks:
      - laravel-apache-uds-network
    depends_on:
      laravel-php-apache-uds:
        condition: service_healthy
      laravel-postgres-apache-uds:
        condition: service_healthy
      laravel-redis-apache-uds:
        condition: service_healthy

  # Только для разработки: интерфейс управления БД (pgAdmin)
  laravel-pgadmin-apache-uds:
    image: dpage/pgadmin4:latest
    container_name: laravel-pgadmin-apache-uds
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - laravel-apache-uds-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost/" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      laravel-postgres-apache-uds:
        condition: service_healthy

volumes:
  unix-socket:
  node_modules:
  postgres-data:
  redis-data:

networks:
  laravel-apache-uds-network:
    driver: bridge
